name: Render Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          HEALTH_URL: ${{ secrets.HEALTH_URL }}
        run: |
          set -e
          code=$(curl -sS -o /dev/null -w "%{http_code}" "$HEALTH_URL")
          echo "HTTP status: $code"
          test "$code" -eq 200